<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Access</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f9fafb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    
  }

  .login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 100%;
    max-width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
  }

  h2 {
    margin-bottom: 20px;
    color: #111827;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    outline: none;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    background: #1d4ed8;
  }

  #error {
    color: red;
    font-size: 14px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>
  <input type="password" id="password" placeholder="Enter password">
  <button onclick="login()">Access Upload Page</button>
  <div id="error"></div>
</div>

<script>
  const correctPassword = "admin567#"; // CHANGE THIS

  function login() {
    const input = document.getElementById("password").value;
    const error = document.getElementById("error");

    if (input === correctPassword) {
      sessionStorage.setItem("authorized", "true");
      window.location.href = "client upload.html"; // your upload page
    } else {
      error.innerText = "Wrong password";
    }
  }
</script>

</body>
</html>
