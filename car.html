<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Car Details</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#111;
      color:white;
      margin:0;
    }

    .car-page{
      max-width:1200px;
      margin:auto;
      padding:30px 20px;
    }

    .main-image{
  width: 100%;
  height: 500px;
  object-fit: contain;
  background: #111;
  border-radius: 12px;
}

    .thumbnail-row{
      display:flex;
      gap:10px;
      margin-top:15px;
      overflow-x:auto;
    }

    .thumbnail-row img{
      width:100px;
      height:80px;
      object-fit:cover;
      border-radius:8px;
      cursor:pointer;
      border:2px solid transparent;
    }

    .thumbnail-row img:hover{
      border-color:#00b792;
    }

    .car-info{
      margin-top:30px;
    }

    .price{
      color:#00b792;
      font-size:2rem;
      font-weight:bold;
      margin:10px 0;
    }

    .spec-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
      margin-top:25px;
    }

    .spec-card{
      background:#1b1b1b;
      color: #111;
      padding:20px;
      border-radius:12px;
    }

    .btn{
      display:inline-block;
      margin-top:30px;
      background:#00b792;
      color:black;
      padding:15px 30px;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div id="carDetails"></div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="script.js"></script>
<script src="cars.js"></script>

</body>
</html>
